<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathing Exercises</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="exercises">
    <main>
        <button class="back">← Back</button>
        <h1>Breathing Exercises</h1>
        
        <section>
            <h2>Morning Routine</h2>
            <div class="cards" id="morning-cards"></div>
        </section>
        
        <section>
            <h2>Midday Routine</h2>
            <div class="cards" id="midday-cards"></div>
        </section>
        
        <section>
            <h2>Evening Routine</h2>
            <div class="cards" id="evening-cards"></div>
        </section>
    </main>
    
    <script src="js/audio.js"></script>
    <script src="js/exercises.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service worker registered'))
                    .catch(err => console.log('Service worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
